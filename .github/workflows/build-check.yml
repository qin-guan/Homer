name: Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '11.0.x'

    - name: Restore dependencies
      run: dotnet restore Homer.slnx

    - name: Build
      run: dotnet build Homer.slnx --no-restore

    - name: Test
      run: dotnet test Homer.slnx --no-build --verbosity normal
